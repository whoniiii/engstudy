<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- 배경: 따뜻한 크림색 둥근 사각형 -->
  <rect width="512" height="512" rx="100" fill="#FFF8E7"/>

  <!-- 카피바라 선생님 (default 포즈) -->
  <g transform="translate(76, 16) scale(3)">
    <!-- Legs -->
    <ellipse cx="44" cy="105" rx="9" ry="5" fill="#C4A265"/>
    <ellipse cx="76" cy="105" rx="9" ry="5" fill="#C4A265"/>

    <!-- Body & belly -->
    <ellipse cx="60" cy="84" rx="28" ry="20" fill="#C4A265"/>
    <ellipse cx="60" cy="87" rx="18" ry="14" fill="#D4B896"/>

    <!-- Arms: left relaxed, right slightly waving -->
    <path d="M34,76 Q26,84 28,92" fill="none" stroke="#C4A265" stroke-width="9" stroke-linecap="round"/>
    <circle cx="28" cy="92" r="5" fill="#C4A265"/>
    <path d="M86,76 Q94,68 90,60" fill="none" stroke="#C4A265" stroke-width="9" stroke-linecap="round"/>
    <circle cx="90" cy="59" r="5" fill="#C4A265"/>

    <!-- Head -->
    <ellipse cx="60" cy="42" rx="30" ry="27" fill="#C4A265"/>

    <!-- Ears -->
    <ellipse cx="35" cy="18" rx="8" ry="5" fill="#C4A265" transform="rotate(-15,35,18)"/>
    <ellipse cx="85" cy="18" rx="8" ry="5" fill="#C4A265" transform="rotate(15,85,18)"/>
    <ellipse cx="35" cy="18" rx="5" ry="3" fill="#D4B896" transform="rotate(-15,35,18)"/>
    <ellipse cx="85" cy="18" rx="5" ry="3" fill="#D4B896" transform="rotate(15,85,18)"/>

    <!-- Muzzle -->
    <ellipse cx="60" cy="50" rx="19" ry="14" fill="#D4B896"/>

    <!-- Glasses (mint, teacher style) -->
    <circle cx="48" cy="40" r="10" fill="none" stroke="#4ECDC4" stroke-width="2.5"/>
    <circle cx="72" cy="40" r="10" fill="none" stroke="#4ECDC4" stroke-width="2.5"/>
    <line x1="58" y1="40" x2="62" y2="40" stroke="#4ECDC4" stroke-width="2.5"/>
    <line x1="38" y1="38" x2="33" y2="32" stroke="#4ECDC4" stroke-width="2" stroke-linecap="round"/>
    <line x1="82" y1="38" x2="87" y2="32" stroke="#4ECDC4" stroke-width="2" stroke-linecap="round"/>
    <!-- Lens glare -->
    <path d="M42,36 Q44,34 46,35" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
    <path d="M66,36 Q68,34 70,35" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>

    <!-- Eyes (normal round with highlights) -->
    <circle cx="48" cy="40" r="3.5" fill="#333"/>
    <circle cx="72" cy="40" r="3.5" fill="#333"/>
    <circle cx="47" cy="39" r="1.2" fill="#fff"/>
    <circle cx="71" cy="39" r="1.2" fill="#fff"/>

    <!-- Nose -->
    <ellipse cx="60" cy="52" rx="5" ry="3.5" fill="#8B6914"/>
    <ellipse cx="58" cy="51" rx="1.5" ry="1" fill="#A07820" opacity="0.5"/>
    <circle cx="57.5" cy="52.5" r="0.8" fill="#6B4E0A" opacity="0.5"/>
    <circle cx="62.5" cy="52.5" r="0.8" fill="#6B4E0A" opacity="0.5"/>

    <!-- Whisker dots -->
    <circle cx="44" cy="49" r="0.7" fill="#8B6914" opacity="0.3"/>
    <circle cx="42" cy="51" r="0.7" fill="#8B6914" opacity="0.3"/>
    <circle cx="44" cy="53" r="0.7" fill="#8B6914" opacity="0.3"/>
    <circle cx="76" cy="49" r="0.7" fill="#8B6914" opacity="0.3"/>
    <circle cx="78" cy="51" r="0.7" fill="#8B6914" opacity="0.3"/>
    <circle cx="76" cy="53" r="0.7" fill="#8B6914" opacity="0.3"/>

    <!-- Cheek blush -->
    <circle cx="36" cy="50" r="6" fill="#E8A0BF" opacity="0.3"/>
    <circle cx="84" cy="50" r="6" fill="#E8A0BF" opacity="0.3"/>

    <!-- Mouth (gentle smile) -->
    <path d="M52,57 Q60,63 68,57" fill="none" stroke="#8B6914" stroke-width="1.8" stroke-linecap="round"/>
  </g>
</svg>
