<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>EngStudy - 영어 단어 게임</title>
<!-- PWA / Standalone -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="카피바라 영어">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#FFF8E7">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="icon.svg">

<style>
:root {
  --bg-primary: #FFF8E7;
  --bg-card: #FFFFFF;
  --accent-1: #FF6B6B;
  --accent-2: #4ECDC4;
  --accent-3: #FFE66D;
  --accent-4: #95E1D3;
  --accent-5: #F38181;
  --text-primary: #2D3436;
  --text-secondary: #636E72;
  --correct: #00B894;
  --wrong: #FF7675;
  --star: #FDCB6E;
  --shadow: 0 4px 15px rgba(0,0,0,0.1);
  --radius: 20px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI','Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:var(--bg-primary);color:var(--text-primary);overflow-x:hidden;-webkit-tap-highlight-color:transparent;}
#app{max-width:480px;margin:0 auto;min-height:100vh;padding:16px;position:relative;}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;border:none;border-radius:var(--radius);font-size:24px;font-weight:700;cursor:pointer;transition:transform .15s,box-shadow .15s;padding:18px 32px;min-height:70px;width:100%;box-shadow:var(--shadow);-webkit-user-select:none;user-select:none;}
.btn:active{transform:scale(0.95);}
.btn-primary{background:linear-gradient(135deg,var(--accent-1),var(--accent-5));color:#fff;}
.btn-mint{background:linear-gradient(135deg,var(--accent-2),var(--accent-4));color:#fff;}
.btn-yellow{background:linear-gradient(135deg,var(--accent-3),#FFD93D);color:var(--text-primary);}
.btn-small{font-size:18px;padding:12px 20px;min-height:50px;width:auto;}
.btn-icon{width:70px;height:70px;border-radius:50%;padding:0;font-size:32px;min-height:auto;}
.btn-icon.listening{animation:pulse 1s infinite;}
.btn-disabled{opacity:0.4;pointer-events:none;}

/* Cards */
.card{background:var(--bg-card);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;animation:fadeIn .4s ease;}
.category-card{display:flex;flex-direction:column;align-items:center;gap:8px;padding:20px 12px;cursor:pointer;transition:transform .2s;min-height:120px;justify-content:center;}
.category-card:active{transform:scale(0.93);}
.category-card svg{width:48px;height:48px;}
.category-card .cat-name{font-size:18px;font-weight:700;}

/* Grids */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.flex-col{display:flex;flex-direction:column;gap:16px;}
.flex-row{display:flex;gap:12px;align-items:center;justify-content:center;}
.center{text-align:center;}

/* Typography */
.title{font-size:28px;font-weight:800;text-align:center;margin:12px 0;}
.subtitle{font-size:20px;color:var(--text-secondary);text-align:center;margin-bottom:16px;}
.korean-text{font-size:32px;font-weight:800;}
.english-text{font-size:28px;font-weight:700;color:var(--accent-2);}

/* Game */
.game-card{display:flex;flex-direction:column;align-items:center;gap:16px;padding:32px 24px;}
.game-card svg{width:120px;height:120px;}
.progress{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.progress-bar{flex:1;height:12px;background:#eee;border-radius:6px;margin:0 12px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent-2),var(--accent-4));border-radius:6px;transition:width .4s ease;}
.progress-text{font-size:16px;font-weight:700;color:var(--text-secondary);min-width:50px;text-align:center;}
.streak-badge{font-size:20px;font-weight:800;color:var(--accent-1);text-align:center;min-height:30px;}

/* Stars */
.stars{display:flex;gap:8px;justify-content:center;margin:12px 0;}
.stars svg{width:48px;height:48px;transition:transform .3s;}
.stars svg.earned{animation:starPop .5s ease;}
.star-big .stars svg{width:64px;height:64px;}

/* Mic / Speaker buttons in game */
.game-controls{display:flex;gap:20px;align-items:center;justify-content:center;margin:16px 0;}

/* Result */
.result-word{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #f0f0f0;}
.result-word svg.word-svg{width:40px;height:40px;}
.result-word .result-stars{display:flex;gap:2px;}
.result-word .result-stars svg{width:20px;height:20px;}

/* Wordbook flip card */
.flip-card{perspective:800px;cursor:pointer;height:180px;}
.flip-inner{position:relative;width:100%;height:100%;transition:transform .5s;transform-style:preserve-3d;}
.flip-card.flipped .flip-inner{transform:rotateY(180deg);}
.flip-front,.flip-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:var(--radius);box-shadow:var(--shadow);background:var(--bg-card);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px;gap:6px;}
.flip-back{transform:rotateY(180deg);background:linear-gradient(135deg,var(--accent-2),var(--accent-4));color:#fff;}
.flip-front svg{width:60px;height:60px;}
.flip-front .wb-korean{font-size:16px;font-weight:700;}
.flip-back .wb-english{font-size:24px;font-weight:800;}

/* Back button */
.back-btn{position:absolute;top:16px;left:16px;z-index:10;background:var(--bg-card);border:none;border-radius:50%;width:44px;height:44px;font-size:22px;cursor:pointer;box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center;}
.back-btn:active{transform:scale(0.9);}

/* Recognized text feedback */
.recognized{font-size:16px;color:var(--text-secondary);min-height:24px;text-align:center;}

/* Nav buttons after eval */
.nav-buttons{display:flex;gap:12px;width:100%;}
.nav-buttons .btn{flex:1;}

/* Speech not supported notice */
.notice{background:#FFF3E0;border-radius:12px;padding:12px 16px;font-size:14px;color:#E65100;text-align:center;margin:8px 0;}

/* Confetti container */
.confetti-wrap{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:100;overflow:hidden;}
.confetti-piece{position:absolute;width:10px;height:10px;border-radius:2px;animation:confettiFall 3s ease-in forwards;}

/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
@keyframes starPop{0%{transform:scale(0) rotate(-30deg)}60%{transform:scale(1.3) rotate(10deg)}100%{transform:scale(1) rotate(0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
@keyframes confettiFall{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
@keyframes celebBounce{0%,100%{transform:scale(1)}30%{transform:scale(1.2)}60%{transform:scale(0.95)}}
@keyframes countPop{0%{transform:scale(0.3);opacity:0}50%{transform:scale(1.2);opacity:1}100%{transform:scale(1);opacity:1}}
@keyframes recordPulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.15);opacity:0.8}}
@keyframes recordingPulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.15);opacity:0.8}}
.recording-pulse{animation:recordingPulse 1s ease-in-out infinite;}
@keyframes progressShrink{from{width:100%}to{width:0%}}
@keyframes borderPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,75,75,0.5)}50%{box-shadow:0 0 0 16px rgba(255,75,75,0)}}

/* Countdown overlay */
.countdown-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.35);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(2px);}
.countdown-number{font-size:140px;font-weight:900;color:#fff;text-shadow:0 6px 30px rgba(0,0,0,0.4);animation:countPop 0.4s ease;}
/* Recording UI */
.recording-overlay{position:fixed;bottom:0;left:0;width:100%;z-index:200;display:flex;flex-direction:column;align-items:center;padding:20px 16px 32px;background:linear-gradient(transparent,rgba(0,0,0,0.25) 30%);}
.recording-dot{width:56px;height:56px;border-radius:50%;background:#FF4B4B;animation:recordPulse 0.8s ease-in-out infinite;display:flex;align-items:center;justify-content:center;}
.recording-dot svg{width:28px;height:28px;}
.recording-label{font-size:26px;font-weight:800;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,0.3);margin-top:8px;}
.recording-progress-wrap{width:80%;max-width:320px;height:8px;background:rgba(255,255,255,0.3);border-radius:4px;margin-top:10px;overflow:hidden;}
.recording-progress-bar{height:100%;background:#FF4B4B;border-radius:4px;animation:progressShrink 3s linear forwards;}
.recording-time{font-size:14px;color:rgba(255,255,255,0.8);margin-top:4px;font-weight:600;}
/* Game card recording border pulse */
.game-card-recording{animation:borderPulse 1s ease-in-out infinite;}

.anim-bounce{animation:bounce 1s ease infinite;}
.anim-float{animation:float 3s ease-in-out infinite;}
.anim-shake{animation:shake .4s ease;}
.anim-slideUp{animation:slideUp .5s ease;}
.anim-celeb{animation:celebBounce .6s ease;}

/* Capybara teacher bubble */
.capybara-bubble {
  position: relative;
  background: white;
  border-radius: 20px;
  padding: 12px 16px;
  font-size: 18px;
  font-weight: 600;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  max-width: 200px;
  line-height: 1.4;
}
.capybara-bubble::after {
  content: '';
  position: absolute;
  bottom: -10px;
  left: 30px;
  border-width: 10px 10px 0;
  border-style: solid;
  border-color: white transparent transparent;
}

/* Listen dots (3-listen requirement) */
.listen-btn {
  flex-direction: column;
}
.listen-dots {
  display: flex;
  gap: 6px;
  justify-content: center;
  margin-top: 8px;
}
.dot {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: #E0E0E0;
  transition: all 0.3s ease;
}
.dot.filled {
  background: var(--star);
  transform: scale(1.2);
  animation: dotPop 0.3s ease;
}
@keyframes dotPop {
  0% { transform: scale(0.5); }
  60% { transform: scale(1.4); }
  100% { transform: scale(1.2); }
}

/* Star collection pop */
@keyframes starCollectionPop {
  0% { transform: scale(0) rotate(-180deg); opacity: 0; }
  60% { transform: scale(1.3) rotate(10deg); opacity: 1; }
  100% { transform: scale(1) rotate(0deg); opacity: 1; }
}

/* Responsive */
@media(max-width:360px){
  .btn{font-size:20px;padding:14px 24px;min-height:60px;}
  .title{font-size:24px;}
  .korean-text{font-size:26px;}
  .game-card svg{width:100px;height:100px;}
  .btn-icon{width:60px;height:60px;font-size:26px;}
}
@media(min-width:768px){
  #app{padding:24px;}
  .game-card svg{width:150px;height:150px;}
}

/* 스탠드얼론 모드 (홈 화면에서 실행) safe area 대응 */
body.standalone {
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
}
body.standalone #app {
  min-height: calc(100vh - env(safe-area-inset-top) - env(safe-area-inset-bottom));
}
</style>

// ============================================================
// Sound Effects (Web Audio API)
// ============================================================
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function playTone(freq, dur, type, vol) {
  try {
    ensureAudio();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type || 'sine';
    o.frequency.value = freq;
    g.gain.value = vol || 0.15;
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + dur);
  } catch(e){}
}

// ============================================================
// Speech APIs (SpeechSynthesis only — MediaRecorder for recording)
// ============================================================

function speak(text, cb) {
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US'; u.rate = 0.75; u.pitch = 1.1;
  // Try to find an English voice
  const voices = speechSynthesis.getVoices();
  const enVoice = voices.find(v => v.lang.startsWith('en'));
  if (enVoice) u.voice = enVoice;
  if (cb) u.onend = cb;
  speechSynthesis.speak(u);
}

// Preload voices
if (speechSynthesis.onvoiceschanged !== undefined) {
  speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
}

function speakWord(word) {
  speak(word);
}
window.speakWord = speakWord;

// MediaRecorder — 로컬 녹음 (서버 전송 없음)
// ============================================================
async function startMediaRecording(targetWord) {
  if (!state.autoFlowActive) return;
  state.isListening = true;
  state.gamePhase = 'listening';
  updateCapybara('speaking', '따라 말해봐!');
  showRecordingUI();

  const gc = document.getElementById('game-card');
  if (gc) gc.classList.add('game-card-recording');

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const mimeType = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' 
      : MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4' : '';
    const mediaRecorder = mimeType ? new MediaRecorder(stream, { mimeType }) : new MediaRecorder(stream);
    const chunks = [];
    state.mediaRecorder = mediaRecorder;

    mediaRecorder.ondataavailable = (e) => {
      if (e.data.size > 0) chunks.push(e.data);
    };

    mediaRecorder.onstop = () => {
      const blobType = mediaRecorder.mimeType || 'audio/webm';
      const blob = new Blob(chunks, { type: blobType });
      const audioUrl = URL.createObjectURL(blob);
      stream.getTracks().forEach(t => t.stop()); // 마이크 해제
      state.isListening = false;
      state.mediaRecorder = null;
      hideRecordingUI();
      const gc2 = document.getElementById('game-card');
      if (gc2) gc2.classList.remove('game-card-recording');
      state.autoFlowActive = false;
      showPlaybackAndEval(audioUrl, targetWord);
    };

    mediaRecorder.start(100); // 100ms마다 데이터 수집 (Safari 호환)
    console.log('[MediaRecorder] 녹음 시작, 대상 단어:', targetWord);

    // 3초 후 자동 정지
    state.recordingTimer = setTimeout(() => {
      state.recordingTimer = null;
      if (mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
      }
    }, 3000);
  } catch (err) {
    console.error('마이크 접근 실패:', err);
    state.isListening = false;
    state.mediaRecorder = null;
    hideRecordingUI();
    const gc2 = document.getElementById('game-card');
    if (gc2) gc2.classList.remove('game-card-recording');
    state.autoFlowActive = false;
    // 마이크 권한 없으면 바로 자기 평가로
    showSelfEvaluation();
  }
}

// localStorage 데이터 관리
// ============================================================
const STORAGE_KEY = 'engstudy_data';

function loadData() {
  try {
    const stored = localStorage.getItem(STORAGE_KEY);
    if (stored) return JSON.parse(stored);
  } catch (e) {
    console.error('데이터 로드 실패, 초기화합니다:', e);
  }
  const data = JSON.parse(JSON.stringify(DEFAULT_DATA));
  saveData(data);
  return data;
}

function saveData(data) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch (e) {
    console.error('데이터 저장 실패:', e);
  }
}

function resetData() {
  localStorage.removeItem(STORAGE_KEY);
  return loadData();
}

function getQuizWords(count, category) {
  const data = loadData();
  let words = data.words;
  if (category && category !== 'all') {
    words = words.filter(w => w.category === category);
  }
  const shuffled = words.slice().sort(() => Math.random() - 0.5);
  return shuffled.slice(0, Math.min(count, shuffled.length));
}

function saveWordStats(wordId, stars, attempts) {
  const data = loadData();
  if (!data.stats.wordStats[wordId]) {
    data.stats.wordStats[wordId] = { attempts: 0, totalStars: 0, bestStars: 0, count: 0 };
  }
  const ws = data.stats.wordStats[wordId];
  ws.attempts += attempts;
  ws.totalStars += stars;
  ws.count++;
  ws.bestStars = Math.max(ws.bestStars, stars);
  data.stats.totalStars += stars;
  if (stars === 3) {
    if (!data.stats.totalCorrect) data.stats.totalCorrect = 0;
    data.stats.totalCorrect++;
  } else {
    if (!data.stats.totalWrong) data.stats.totalWrong = 0;
    data.stats.totalWrong++;
  }
  saveData(data);
}

// 3-listen tracking
var _myListenCount = 0;
var _origListenCount = 0;
var _myPlaying = false;
var _origPlaying = false;

function setListenBtnDisabled(id, disabled) {
  var btn = document.getElementById(id);
  if (!btn) return;
  btn.disabled = disabled;
  btn.style.opacity = disabled ? '0.5' : '1';
  btn.style.pointerEvents = disabled ? 'none' : 'auto';
}

function playMyRecording() {
  if (_myPlaying || !state.lastRecordingUrl) return;
  _myPlaying = true;
  setListenBtnDisabled('btn-my-listen', true);
  setListenBtnDisabled('btn-orig-listen', true);
  var audio = new Audio(state.lastRecordingUrl);
  audio.onended = function() {
    _myPlaying = false;
    _myListenCount++;
    if (_myListenCount <= 3) {
      var dot = document.getElementById('my-dot-' + _myListenCount);
      if (dot) dot.classList.add('filled');
    }
    setListenBtnDisabled('btn-my-listen', false);
    setListenBtnDisabled('btn-orig-listen', false);
    checkListenComplete();
  };
  audio.onerror = function() {
    _myPlaying = false;
    setListenBtnDisabled('btn-my-listen', false);
    setListenBtnDisabled('btn-orig-listen', false);
  };
  audio.play();
}
window.playMyRecording = playMyRecording;

function playOriginalSound() {
  if (_origPlaying) return;
  _origPlaying = true;
  setListenBtnDisabled('btn-my-listen', true);
  setListenBtnDisabled('btn-orig-listen', true);
  var q = state.questions[state.currentIndex];
  var u = new SpeechSynthesisUtterance(q.english);
  u.lang = 'en-US'; u.rate = 0.8;
  u.onend = function() {
    _origPlaying = false;
    _origListenCount++;
    if (_origListenCount <= 3) {
      var dot = document.getElementById('orig-dot-' + _origListenCount);
      if (dot) dot.classList.add('filled');
    }
    setListenBtnDisabled('btn-my-listen', false);
    setListenBtnDisabled('btn-orig-listen', false);
    checkListenComplete();
  };
  u.onerror = function() {
    _origPlaying = false;
    setListenBtnDisabled('btn-my-listen', false);
    setListenBtnDisabled('btn-orig-listen', false);
  };
  speechSynthesis.speak(u);
}
window.playOriginalSound = playOriginalSound;

function checkListenComplete() {
  var myDone = _myListenCount >= 3;
  var origDone = _origListenCount >= 3;
  if (myDone && origDone) {
    var evalArea = document.getElementById('eval-buttons');
    if (evalArea) evalArea.style.display = 'flex';
    updateCapybara('happy', '다 들었구나! 이제 평가해볼까?');
  } else {
    updateCapybara('cheering', '잘 듣고 있어! 조금만 더!');
  }
}

function handleRoute() {
  const hash = location.hash.slice(1) || 'home';
  const app = document.getElementById('app');
  // Cancel any ongoing speech
  speechSynthesis.cancel();
  cancelAutoFlow();
  state.isListening = false;

  switch(hash) {
    case 'home': renderHome(app); break;
    case 'categories': renderCategories(app); break;
    case 'game': renderGame(app); break;
    case 'result': renderResult(app); break;
    case 'wordbook': renderWordbook(app); break;
    default:
      if (hash.startsWith('wordbook/')) renderWordbookCategory(app, hash.split('/')[1]);
      else renderHome(app);
  }
}

window.addEventListener('hashchange', handleRoute);

// ============================================================
// Auto Flow: Countdown → Auto Recording
// ============================================================
function cancelAutoFlow() {
  if (state.countdownTimer) { clearInterval(state.countdownTimer); state.countdownTimer = null; }
  if (state.recordingTimer) { clearTimeout(state.recordingTimer); state.recordingTimer = null; }
  if (state.mediaRecorder) {
    try {
      if (state.mediaRecorder.state === 'recording') state.mediaRecorder.stop();
    } catch(e){}
    state.mediaRecorder = null;
  }
  state.isListening = false;
  state.autoFlowActive = false;
  hideCountdownUI();
  hideRecordingUI();
}

function startCountdown() {
  cancelAutoFlow();
  state.autoFlowActive = true;
  state.gamePhase = 'countdown';
  updateCapybara('thinking', '준비~');
  let count = 3;
  showCountdownUI(count);
  playTick();
  state.countdownTimer = setInterval(() => {
    count--;
    if (count > 0) {
      showCountdownUI(count);
      playTick();
    } else {
      clearInterval(state.countdownTimer);
      state.countdownTimer = null;
      hideCountdownUI();
      playGo();
      const q = state.questions[state.currentIndex];
      startMediaRecording(q.english);
    }
  }, 1000);
}

function showCountdownUI(n) {
  let el = document.getElementById('countdown-overlay');
  if (!el) {
    el = document.createElement('div');
    el.id = 'countdown-overlay';
    el.className = 'countdown-overlay';
    document.body.appendChild(el);
  }
  el.innerHTML = '<span class="countdown-number" key="'+n+'">'+n+'</span>';
  el.style.display = 'flex';
  el.onclick = null;
}

function hideCountdownUI() {
  const el = document.getElementById('countdown-overlay');
  if (el) el.remove();
}

// 음성인식 실패 시 자기 평가 UI
function showSelfEvaluation() {
  const q = state.questions[state.currentIndex];
  // 영어 단어를 보여주고, 아이가 따라 말한 뒤 스스로 평가
  const starsArea = document.getElementById('stars-area');
  const recText = document.getElementById('recognized-text');
  const navArea = document.getElementById('nav-area');
  const gc = document.getElementById('game-controls');
  if (gc) gc.style.display = 'none';

  if (recText) {
    recText.innerHTML = '<div style="font-size:28px;font-weight:700;color:var(--accent-2);margin:8px 0;">'+q.english+'</div>'
      + '<div style="font-size:16px;color:var(--text-secondary);margin-bottom:12px;">소리를 듣고 따라 말해봤나요?<br>얼마나 잘했는지 골라주세요!</div>'
      + '<div class="flex-row" style="gap:8px;flex-wrap:wrap;justify-content:center;">'
      + '<button class="btn btn-small" style="background:var(--wrong);color:#fff;flex:1;min-width:90px;" onclick="selfRate(1)">'+getStarSVG(1)+' 어려워요</button>'
      + '<button class="btn btn-small" style="background:var(--accent-3);color:var(--text-primary);flex:1;min-width:90px;" onclick="selfRate(2)">'+getStarSVG(2)+' 잘했어!</button>'
      + '<button class="btn btn-small" style="background:var(--correct);color:#fff;flex:1;min-width:90px;" onclick="selfRate(3)">'+getStarSVG(3)+' 완벽!</button>'
      + '</div>';
  }
}

function selfRate(stars) {
  state.hasAttempted = true;
  state.currentAttempts++;
  showEvaluation('(자기 평가)', stars);
}
window.selfRate = selfRate;

function getStarSVG(count) {
  let s = '';
  for (let i = 0; i < count; i++) {
    s += '<svg viewBox="0 0 24 24" width="18" height="18" style="vertical-align:middle;"><polygon points="12,2 15,9 22,9 17,14 19,21 12,17 5,21 7,14 2,9 9,9" fill="#FDCB6E" stroke="#F39C12" stroke-width="1"/></svg>';
  }
  return s;
}

function showRecordingUI() {
  let el = document.getElementById('recording-overlay');
  if (!el) {
    el = document.createElement('div');
    el.id = 'recording-overlay';
    el.className = 'countdown-overlay';
    document.body.appendChild(el);
  }
  el.style.display = 'flex';
  el.innerHTML = '<div style="text-align:center;">'
    + '<div class="recording-pulse" style="width:120px;height:120px;border-radius:50%;background:var(--accent-1);margin:0 auto 24px;display:flex;align-items:center;justify-content:center;">'
    + '<svg viewBox="0 0 32 32" width="56" height="56"><rect x="12" y="4" width="8" height="16" rx="4" fill="#fff"/><path d="M8,16 Q8,26 16,26 Q24,26 24,16" stroke="#fff" stroke-width="2" fill="none"/><line x1="16" y1="26" x2="16" y2="30" stroke="#fff" stroke-width="2"/></svg>'
    + '</div>'
    + '<p style="font-size:28px;font-weight:bold;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,.3);margin-bottom:16px;">따라 말해봐! 🗣️</p>'
    + '<div style="width:80%;max-width:320px;height:12px;background:rgba(255,255,255,0.3);border-radius:6px;margin:0 auto 12px;overflow:hidden;">'
    + '<div id="rec-progress-fill" style="height:100%;background:#fff;border-radius:6px;transition:width 3s linear;width:0%;"></div>'
    + '</div>'
    + '<p style="font-size:18px;color:rgba(255,255,255,0.8);">녹음 중...</p>'
    + '</div>';
  // Progress bar 0% → 100% 트리거
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      const fill = document.getElementById('rec-progress-fill');
      if (fill) fill.style.width = '100%';
    });
  });
}

function hideRecordingUI() {
  const el = document.getElementById('recording-overlay');
  if (el) el.remove();
}

// ============================================================
// Screen: Game
// ============================================================
function renderGame(app) {
  if (state.questions.length === 0) { navigate('categories'); return; }
  const q = state.questions[state.currentIndex];
  const total = state.questions.length;
  const pct = ((state.currentIndex) / total * 100).toFixed(0);

  state.gamePhase = 'listen';
  state.hasAttempted = false;
  state.currentAttempts = 0;
  state.lastStars = 0;
  state.lastRecognized = '';

  app.innerHTML = '<button class="back-btn" onclick="confirmQuit()">&#9664;</button>'
    + '<div class="flex-col" style="padding-top:52px;">'
    // Progress
    + '<div class="progress"><span class="progress-text">'+(state.currentIndex+1)+'/'+total+'</span>'
    + '<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div></div>'
    // Streak
    + '<div class="streak-badge" id="streak-badge">'+getStreakText()+'</div>'
    // Capybara area
    + '<div id="capybara-area" style="display:flex;align-items:flex-end;gap:8px;margin-bottom:16px;">'
    + '<div id="capybara-character">'+getCapybaraSVG('speaking', 80)+'</div>'
    + '<div id="capybara-bubble" class="capybara-bubble">이 단어를 잘 들어봐~</div>'
    + '</div>'
    // Card
    + '<div class="card game-card anim-slideUp" id="game-card">'
    // Star collection bar
    + '<div id="star-collection" style="display:flex;align-items:center;gap:4px;justify-content:center;flex-wrap:wrap;min-height:40px;padding:8px;background:rgba(255,255,255,0.5);border-radius:16px;margin-bottom:12px;"></div>'
    + '<div id="word-svg">'+getWordSVG(q.english)+'</div>'
    + '<div class="korean-text">'+q.korean+'</div>'
    + '<div id="stars-area" style="min-height:60px;"></div>'
    + '<div class="recognized" id="recognized-text"></div>'
    + '</div>'
    // Controls
    + '<div class="game-controls" id="game-controls">'
    + '<button class="btn btn-icon btn-mint" onclick="replaySound()" title="다시 듣기" id="listen-btn">'+getSpeakerSVG()+'</button>'
    + '</div>'
    + '<div class="nav-buttons" id="nav-area" style="display:none;"></div>'
    + '</div>';

  // Populate existing stars from previous words in this round
  populateExistingStars();

  // Auto-play pronunciation → countdown → auto recording
  setTimeout(() => {
    updateCapybara('speaking', '이 단어를 잘 들어봐~');
    speak(q.english, () => {
      startCountdown();
    });
  }, 500);
}

function getStreakText() {
  if (state.streak >= 5) return '&#128081; '+state.streak+'연속 완벽! 대단해!';
  if (state.streak >= 3) return '&#128293; '+state.streak+'연속 완벽!';
  if (state.streak > 0) return '&#11088; '+state.streak+'연속!';
  return '';
}

function confirmQuit() {
  if (state.currentIndex > 0 && state.gamePhase !== 'evaluated') {
    if (!confirm('게임을 그만할까요?')) return;
  }
  cancelAutoFlow();
  navigate('categories');
}
window.confirmQuit = confirmQuit;

function replaySound() {
  playClick();
  cancelAutoFlow();
  const q = state.questions[state.currentIndex];
  updateCapybara('speaking', '이 단어를 잘 들어봐~');
  speak(q.english, () => {
    startCountdown();
  });
}
window.replaySound = replaySound;

function startSpeaking() {
  // Legacy: manual recording is replaced by auto-flow
  if (state.isListening || state.autoFlowActive) return;
  const q = state.questions[state.currentIndex];
  playClick();

  // Trigger the auto flow: speak → countdown → record
  cancelAutoFlow();
  speak(q.english, () => {
    startCountdown();
  });
}
window.startSpeaking = startSpeaking;

function showEvaluation(transcript, stars) {
  state.gamePhase = 'evaluated';
  state.lastStars = stars;
  state.lastRecognized = transcript;
  hideRecordingUI();
  hideCountdownUI();

  // Hide game controls during evaluation
  const gc = document.getElementById('game-controls');
  if (gc) gc.style.display = 'none';

  if (stars === 3) {
    state.streak++;
    state.maxStreak = Math.max(state.maxStreak, state.streak);
    playSuccess();
    updateCapybara('happy', '완벽해! 천재인걸?!');
  } else if (stars === 2) {
    state.streak = 0;
    playClick();
    updateCapybara('cheering', '잘했어! 조금만 더!');
  } else {
    state.streak = 0;
    playTryAgain();
    updateCapybara('cheering', '괜찮아! 다시 해보자!');
  }

  // Add stars to collection
  addStarsToCollection(stars);

  // Update streak
  const sb = document.getElementById('streak-badge');
  if (sb) sb.innerHTML = getStreakText();

  // Show stars
  const sa = document.getElementById('stars-area');
  if (sa) {
    let html = '<div class="stars">';
    for (let i = 1; i <= 3; i++) {
      const cls = i <= stars ? 'earned' : '';
      html += '<svg viewBox="0 0 24 24" class="'+cls+'" style="animation-delay:'+(i*0.15)+'s">'
        + '<polygon points="12,2 15,9 23,9 17,14 19,22 12,17 5,22 7,14 1,9 9,9" fill="'+(i<=stars?'var(--star)':'#E0E0E0')+'" stroke="'+(i<=stars?'#F0B429':'#ccc')+'" stroke-width="1"/></svg>';
    }
    html += '</div>';
    const messages = ['다시 해볼까? 💪', '잘했어! 👏', '완벽해! 🌟'];
    html += '<div style="font-size:22px;font-weight:700;margin-top:4px;">'+messages[stars-1]+'</div>';
    sa.innerHTML = html;
  }

  // Show recognized text
  const rt = document.getElementById('recognized-text');
  if (rt && transcript) rt.textContent = '"'+transcript+'"';

  // Show nav buttons
  const nav = document.getElementById('nav-area');
  if (nav) {
    nav.style.display = 'flex';
    const isLast = state.currentIndex >= state.questions.length - 1;
    let html = '<button class="btn btn-small btn-yellow" onclick="retryWord()">다시 하기</button>';
    html += '<button class="btn btn-small btn-mint" onclick="nextWord()">'+(isLast?'결과 보기':'다음 단어')+'</button>';
    nav.innerHTML = html;
  }

  // Confetti on 3 stars
  if (stars === 3) spawnConfetti();

  // Post stats
  const q = state.questions[state.currentIndex];
  try { saveWordStats(q.id, stars, state.currentAttempts); } catch(e) {}
}

function retryWord() {
  playClick();
  cancelAutoFlow();
  state.gamePhase = 'listen';
  state.lastStars = 0;
  state.lastRecognized = '';
  // Re-render game card content
  const q = state.questions[state.currentIndex];
  const sa = document.getElementById('stars-area');
  if (sa) sa.innerHTML = '';
  const rt = document.getElementById('recognized-text');
  if (rt) rt.textContent = '';
  const nav = document.getElementById('nav-area');
  if (nav) nav.style.display = 'none';
  // Show controls again
  const gc = document.getElementById('game-controls');
  if (gc) gc.style.display = 'flex';
  // Replay sound → countdown → auto recording
  updateCapybara('speaking', '이 단어를 잘 들어봐~');
  setTimeout(() => speak(q.english, () => {
    startCountdown();
  }), 300);
}
window.retryWord = retryWord;

function nextWord() {
  playClick();
  state.results.push({
    wordId: state.questions[state.currentIndex].id,
    word: state.questions[state.currentIndex],
    stars: state.lastStars,
    attempts: state.currentAttempts
  });

  state.currentIndex++;
  if (state.currentIndex >= state.questions.length) {
    navigate('result');
    return;
  }
  renderGame(document.getElementById('app'));
}
window.nextWord = nextWord;

// ============================================================
// Screen: Result
// ============================================================
function renderResult(app) {
  playCelebration();
  const totalStars = state.results.reduce((s,r) => s + r.stars, 0);
  const maxStars = state.results.length * 3;
  const pct = Math.round(totalStars / maxStars * 100);

  let msg, msgColor, capyMsg;
  if (pct >= 90) { msg = '최고야! 정말 잘했어! 🏆'; msgColor = 'var(--accent-3)'; capyMsg = '오늘도 열심히 했어! 천재야!'; }
  else if (pct >= 70) { msg = '아주 잘했어! 👏'; msgColor = 'var(--accent-2)'; capyMsg = '오늘도 열심히 했어! 대단해!'; }
  else if (pct >= 50) { msg = '잘했어! 조금 더 연습하자! 💪'; msgColor = 'var(--accent-1)'; capyMsg = '잘했어! 다음에 더 잘할 수 있어!'; }
  else { msg = '괜찮아! 다시 해보자! 🌟'; msgColor = 'var(--accent-5)'; capyMsg = '괜찮아! 다시 도전해보자!'; }

  let wordListHtml = '';
  state.results.forEach(r => {
    let starsHtml = '';
    for (let i = 1; i <= 3; i++) {
      starsHtml += getStarSVG(i <= r.stars);
    }
    wordListHtml += '<div class="result-word">'
      + '<div class="word-svg" style="width:40px;height:40px;flex-shrink:0;">'+getWordSVG(r.word.english)+'</div>'
      + '<div style="flex:1;font-size:16px;font-weight:600;">'+r.word.korean+'</div>'
      + '<div class="result-stars">'+starsHtml+'</div>'
      + '</div>';
  });

  app.innerHTML = '<div class="flex-col center" style="padding-top:16px;">'
    + '<div class="anim-celeb" style="margin:12px 0;">'+getCapybaraSVG('happy', 160)+'</div>'
    + '<div class="capybara-bubble" style="margin:0 auto 16px;text-align:center;">'+capyMsg+'</div>'
    + '<h1 class="title" style="color:'+msgColor+'">'+msg+'</h1>'
    + '<div class="card star-big anim-slideUp" style="margin:12px 0;">'
    + '<div class="stars" style="margin-bottom:8px;">' + Array.from({length:3},(_,i)=>getStarSVG(i < Math.round(totalStars/state.results.length))).join('') + '</div>'
    + '<div style="font-size:20px;font-weight:700;">카피바라 선생님과 ⭐ '+totalStars+'개를 모았어요!</div>'
    + (state.maxStreak >= 3 ? '<div style="font-size:16px;margin-top:4px;color:var(--accent-1);">최대 연속 '+state.maxStreak+'개!</div>' : '')
    + '</div>'
    + '<div class="card anim-slideUp" style="animation-delay:.2s;width:100%;">'
    + '<div style="font-size:18px;font-weight:700;margin-bottom:8px;">단어별 결과</div>'
    + wordListHtml + '</div>'
    + '<div class="flex-col" style="margin-top:12px;width:100%;gap:10px;">'
    + '<button class="btn btn-primary" onclick="navigate(\'categories\')">다시 하기</button>'
    + '<button class="btn btn-mint" onclick="navigate(\'home\')">홈으로</button>'
    + '</div></div>';

  spawnConfetti();
}

// ============================================================
// Screen: Wordbook
// ============================================================
function renderWordbook(app) {
  app.innerHTML = '<button class="back-btn" onclick="navigate(\'home\')">&#9664;</button>'
    + '<div class="flex-col center" style="padding-top:60px;">'
    + '<h1 class="title">단어장</h1>'
    + '<p class="subtitle">카테고리를 선택해요</p>'
    + '<div class="grid-2" id="wb-grid"></div></div>';

  const data = loadData();
  state.words = data.words;
  state.categories = data.categories;

  const grid = document.getElementById('wb-grid');
  if (!grid) return;

  let html = '<div class="card category-card" onclick="navigate(\'wordbook/all\')">'
    + '<svg viewBox="0 0 48 48" width="48" height="48"><polygon points="24,4 29,18 44,18 32,27 36,42 24,33 12,42 16,27 4,18 19,18" fill="var(--accent-3)" stroke="#F0B429" stroke-width="1"/></svg>'
    + '<span class="cat-name">전체</span>'
    + '<span style="font-size:13px;color:var(--text-secondary);">'+state.words.length+'개</span></div>';
  state.categories.forEach(c => {
    const count = state.words.filter(w=>w.category===c.id).length;
    html += '<div class="card category-card" onclick="navigate(\'wordbook/'+c.id+'\')">'
      + getCategorySVG(c.id)
      + '<span class="cat-name">'+c.name+'</span>'
      + '<span style="font-size:13px;color:var(--text-secondary);">'+count+'개</span></div>';
  });
  grid.innerHTML = html;
}

function renderWordbookCategory(app, catId) {
  const words = catId === 'all' ? state.words : state.words.filter(w=>w.category===catId);
  const catName = catId === 'all' ? '전체' : (state.categories.find(c=>c.id===catId)||{}).name || catId;

  app.innerHTML = '<button class="back-btn" onclick="navigate(\'wordbook\')">&#9664;</button>'
    + '<div class="flex-col" style="padding-top:60px;">'
    + '<h1 class="title">'+catName+' 단어장</h1>'
    + '<div class="grid-2" id="wb-cards"></div></div>';

  const container = document.getElementById('wb-cards');
  if (!container) return;

  let html = '';
  words.forEach((w, i) => {
    html += '<div class="flip-card" id="fc-'+i+'" onclick="flipCard(\'fc-'+i+'\')">'
      + '<div class="flip-inner">'
      + '<div class="flip-front">'
      + getWordSVG(w.english)
      + '<div class="wb-korean">'+w.korean+'</div>'
      + '<button class="btn btn-small btn-mint" style="width:auto;min-height:36px;padding:6px 14px;font-size:14px;" onclick="event.stopPropagation();playWordSound(\''+w.english+'\')">'
      + getSpeakerSVG() + '</button></div>'
      + '<div class="flip-back">'
      + '<div class="wb-english">'+w.english+'</div>'
      + '<div style="font-size:16px;">'+w.korean+'</div>'
      + '</div></div></div>';
  });
  container.innerHTML = html;
}

function flipCard(id) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle('flipped');
  playClick();
}
window.flipCard = flipCard;

function playWordSound(word) {
  playClick();
  speak(word);
}
window.playWordSound = playWordSound;

// ============================================================
// Confetti
// ============================================================
function spawnConfetti() {
  const wrap = document.createElement('div');
  wrap.className = 'confetti-wrap';
  document.body.appendChild(wrap);
  const colors = ['#FF6B6B','#4ECDC4','#FFE66D','#F38181','#95E1D3','#FDCB6E','#A29BFE','#FD79A8'];
  for (let i = 0; i < 40; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random()*100+'%';
    piece.style.background = colors[Math.floor(Math.random()*colors.length)];
    piece.style.animationDelay = Math.random()*1.5+'s';
    piece.style.animationDuration = (2+Math.random()*2)+'s';
    piece.style.width = (6+Math.random()*8)+'px';
    piece.style.height = (6+Math.random()*8)+'px';
    piece.style.borderRadius = Math.random()>0.5?'50%':'2px';
    wrap.appendChild(piece);
  }
  setTimeout(() => wrap.remove(), 4000);
}

// ============================================================
// Init
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  // Preload data from localStorage
  const data = loadData();
  state.words = data.words || [];
  state.categories = data.categories || [];

  // Handle initial route
  handleRoute();
});
</script>
</body>
</html>
